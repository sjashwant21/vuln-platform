name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for secret scanning of full history

      - name: Secret Scanning (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          version: "latest"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        working-directory: ./backend
        run: uv sync

      - name: Lint with Ruff
        working-directory: ./backend
        run: |
          uv run ruff check app/ tests/
          uv run ruff format --check app/ tests/

      - name: Type Check with Mypy
        working-directory: ./backend
        run: uv run mypy app/ --ignore-missing-imports

      - name: Frontend Linting (npm)
        working-directory: ./frontend
        run: |
          npm ci
          npm run lint

  test:
    needs: security-and-lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: vulnassess_user
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: vulnassess_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        working-directory: ./backend
        run: uv sync

      - name: Run Pytest
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql+asyncpg://vulnassess_user:testpassword@localhost:5432/vulnassess_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test_secret_key
          JWT_SECRET_KEY: test_jwt_secret_key
        run: uv run pytest tests/ -v
