name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "ruff==0.15.22" pytest pytest-cov pip-audit

      - name: Run Ruff Linter
        working-directory: ./backend
        run: ruff check .

      - name: Run Pytest with Coverage
        working-directory: ./backend
        env:
          APP_ENV: test
          SECRET_KEY: "ci-test-secret-key-32-chars-minimum-pad"
          JWT_SECRET_KEY: "ci-test-jwt-secret-key-64-chars-minimum-padding-here-1234567890ab"
          DATABASE_URL: "postgresql+asyncpg://test:test@localhost:5432/test_db"
          REDIS_URL: "redis://localhost:6379/15"
          GROQ_API_KEY: "test-groq-key"
          NVD_API_KEY: "test-nvd-key"
        run: pytest tests/ --cov=app --cov-fail-under=60

      - name: Run Pip Audit
        working-directory: ./backend
        run: pip-audit

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build Application
        working-directory: ./frontend
        run: npm run build

      - name: Run NPM Audit
        working-directory: ./frontend
        run: npm audit --audit-level=high

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
